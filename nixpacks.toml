# Nixpacks build config for Railway.
#
# NOTE: chromium install was removed because it can break nixpacks builds
# depending on the Nix channel version. The LinkedIn enricher will fall back
# to axios+cheerio when no Chrome binary is found. To enable puppeteer again
# later, add "chromium" to nixPkgs below:
#     [phases.setup]
#     nixPkgs = ["nodejs_20", "chromium"]

[phases.build]
cmds = ["npm install"]

[start]
cmd = "node index.js"
